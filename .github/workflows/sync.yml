# Sistema de Cobros CobroYa
Este es el repositorio oficial de mi SaaS de gestión financiera.

name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://LixanderGT:$HF_TOKEN@huggingface.co/spaces/LixanderGT/Sistema-Cobros main
